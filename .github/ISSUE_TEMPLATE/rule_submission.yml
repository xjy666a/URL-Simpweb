name: 📤 提交自定义规则
description: 我已经写好了清理规则，想要上传分享
title: "[Rule] 提交规则："
labels: ["rule-submission", "community"]
body:
  - type: markdown
    attributes:
      value: |
        感谢您分享自定义规则！请填写以下详细信息，帮助我们快速审核和合并您的规则。

  - type: input
    id: website-name
    attributes:
      label: 🌐 网站名称
      description: 这个规则是针对哪个网站的？
      placeholder: 例如：Example、Example Blog、Example Shop
    validations:
      required: true

  - type: input
    id: website-domain
    attributes:
      label: 🔗 网站域名
      description: 网站的主要域名（不需要 www）
      placeholder: 例如：example.com、blog.example.com
    validations:
      required: true

  - type: textarea
    id: website-description
    attributes:
      label: 📝 网站简介
      description: 简单介绍一下这个网站是做什么的
      placeholder: |
        例如：
        - Example 是一个技术博客平台
        - 用户可以在上面发布和阅读技术文章
        - 分享链接时带有 utm 追踪参数
    validations:
      required: false

  - type: textarea
    id: custom-rule
    attributes:
      label: 📋 您的自定义规则
      description: 请粘贴您写好的完整规则配置
      placeholder: |
        name: Example 博客
        domain: example.com
        path: /article/
        keep: id, slug
        remove: utm_source, utm_medium, utm_campaign, ref
        action: redirect
      render: yaml
    validations:
      required: true

  - type: textarea
    id: rule-example-before
    attributes:
      label: 🔴 清理前的链接示例
      description: 提供一个应用规则前的原始链接
      placeholder: |
        https://www.example.com/article/how-to-use-url-cleaner?id=12345&utm_source=wechat&utm_medium=social&ref=homepage
    validations:
      required: true

  - type: textarea
    id: rule-example-after
    attributes:
      label: 🟢 清理后的链接示例
      description: 提供应用规则后的预期结果
      placeholder: |
        https://www.example.com/article/how-to-use-url-cleaner?id=12345
    validations:
      required: true

  - type: dropdown
    id: rule-action
    attributes:
      label: ⚡ 规则动作类型
      description: 您的规则使用哪种动作？
      options:
        - redirect（跳转到新链接）
        - replace（替换当前URL，不刷新页面）
        - 不确定
    validations:
      required: true

  - type: textarea
    id: rule-params-explanation
    attributes:
      label: 🔍 参数说明
      description: 解释一下您保留和移除的参数分别是什么作用
      placeholder: |
        保留的参数：
        - id：文章的唯一标识，必须保留才能访问文章
        - slug：文章的URL别名，用于SEO
        
        移除的参数：
        - utm_source, utm_medium, utm_campaign：营销推广追踪参数
        - ref：来源页面标记
    validations:
      required: false

  - type: textarea
    id: rule-testing
    attributes:
      label: 🧪 测试情况
      description: 您测试过这个规则吗？测试结果如何？
      placeholder: |
        例如：
        - 已在 Chrome 浏览器测试通过
        - 测试了 10 篇不同的文章页面，都能正常清理
        - 测试了文章列表页、搜索页，不会误触发
        - 没有误删重要参数，清理后的链接可以正常访问
    validations:
      required: false

  - type: textarea
    id: rule-edge-cases
    attributes:
      label: ⚠️ 特殊情况
      description: 有没有哪些页面或链接不适用这个规则？
      placeholder: |
        例如：
        - 用户个人主页链接不需要清理（没有多余参数）
        - 某些旧版文章链接格式不同，可能不适用
        - 付费文章链接有特殊参数，不建议清理
    validations:
      required: false

  - type: textarea
    id: rule-notes
    attributes:
      label: 💬 补充说明
      description: 关于这个规则的任何其他信息
      placeholder: |
        例如：
        - 这个规则参考了其他类似网站的清理逻辑
        - 建议优先发布到测试版渠道，观察一段时间
        - 该网站在国内访问速度较快，用户群体较大
    validations:
      required: false

  - type: checkboxes
    id: submission-check
    attributes:
      label: ✅ 提交前确认
      options:
        - label: 我已确认这个规则不会误删重要参数
          required: true
        - label: 我已测试过这个规则，可以正常工作
          required: true
        - label: 我理解规则审核需要一定时间
          required: true
        - label: 我愿意根据反馈修改规则
          required: false

  - type: markdown
    attributes:
      value: |
        ---
        📌 **提交后会发生什么？**
        
        1. 维护者会审核您提交的规则
        2. 如有问题会在此 Issue 中与您沟通
        3. 审核通过后会合并到对应版本渠道
        4. 您的贡献将被记录在贡献者列表中
        
        感谢您的贡献！🎉
