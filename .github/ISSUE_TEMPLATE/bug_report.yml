name: 🐛 功能问题反馈
description: 报告脚本功能、界面、兼容性等问题（非规则问题）
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢您提交反馈！请填写以下信息，帮助我们更快地定位和解决问题。
        
        💡 **提示**：如果是**规则问题**（如某个网站链接清理不正确），请使用"📋 规则问题反馈"模板。

  - type: textarea
    id: description
    attributes:
      label: 📋 问题描述
      description: 请详细描述您遇到的问题
      placeholder: |
        例如：
        - 脚本设置面板无法打开
        - 云端同步功能报错
        - 界面显示异常
        - 与其他扩展冲突
        - 脚本菜单无法显示
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: 🔁 复现步骤
      description: 请详细描述如何复现这个问题
      placeholder: |
        1. 打开浏览器，访问任意网页
        2. 点击 Tampermonkey 图标
        3. 选择"打开设置面板"
        4. 看到什么问题（面板无法打开 / 报错 / 显示空白）
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: ✅ 预期行为
      description: 描述您期望看到的正确行为
      placeholder: |
        例如：
        - 设置面板正常打开并显示所有选项
        - 云端同步成功完成
        - 界面正常显示无错位
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: 🌐 浏览器
      description: 您使用的是什么浏览器？
      options:
        - Chrome
        - Firefox
        - Edge
        - Safari
        - 其他
    validations:
      required: true

  - type: dropdown
    id: channel
    attributes:
      label: 📦 使用的版本渠道
      description: 您当前使用的是哪个更新渠道？
      options:
        - 稳定版
        - 测试版
        - 开发版
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: 📸 截图
      description: 如果有相关截图，请在此上传（可以拖拽图片或点击上传）
      placeholder: |
        建议提供：
        - 问题发生时的界面截图
        - 浏览器控制台报错信息（按 F12 打开开发者工具，切换到 Console 标签）
        - 网络请求信息（如有）

  - type: textarea
    id: additional
    attributes:
      label: 💬 其他信息
      description: 任何其他可能相关的信息
      placeholder: |
        例如：
        - 操作系统版本（Windows 10 / macOS / Linux）
        - 脚本管理器版本（Tampermonkey v5.x / Violentmonkey v2.x）
        - 网络环境（公司网络 / 家庭网络 / VPN）
        - 是否安装了其他可能影响脚本的扩展
        - 问题出现的频率（每次 / 偶尔 / 特定条件下）

  - type: markdown
    attributes:
      value: |
        ---
        💡 **提示**：您可以通过脚本菜单中的 "📋 复制记录用于反馈" 功能，自动收集调试信息并粘贴到这里。
