name: 📝 规则请求
description: 请求支持新的网站链接清理或上传自定义规则
title: "[Rule] "
labels: ["new-rule"]
body:
  - type: markdown
    attributes:
      value: |
        感谢您贡献新规则！请选择适合您的选项：

  - type: dropdown
    id: request-type
    attributes:
      label: 您想做什么？
      options:
        - 我有写好的规则，想要上传分享
        - 我发现某个网站可以优化，但不太清楚具体参数
    validations:
      required: true

  # 选项一：已有规则想要上传
  - type: markdown
    attributes:
      value: |
        ---
        ## 📤 上传自定义规则
        
        请填写以下信息：

  - type: input
    id: website-name
    attributes:
      label: 网站名称
      description: 这个规则是针对哪个网站的？
      placeholder: 例如：知乎

  - type: input
    id: website-domain
    attributes:
      label: 网站域名
      description: 网站的主要域名
      placeholder: 例如：zhihu.com

  - type: textarea
    id: custom-rule
    attributes:
      label: 您的自定义规则
      description: 请粘贴您写好的规则配置
      placeholder: |
        name: 知乎
        domain: zhihu.com
        path: /question/
        keep: id
        remove: share,utm_source
        action: redirect
      render: yaml

  - type: textarea
    id: rule-example-urls
    attributes:
      label: 规则效果示例
      description: 展示规则应用前后的效果
      placeholder: |
        清理前：https://www.zhihu.com/question/123456?share=1&utm_source=wechat
        清理后：https://www.zhihu.com/question/123456

  - type: textarea
    id: rule-notes
    attributes:
      label: 补充说明
      description: 关于这个规则的任何补充信息
      placeholder: 例如：这个规则已经测试过，可以正常使用...

  # 选项二：发现网站但不太清楚
  - type: markdown
    attributes:
      value: |
        ---
        ## 🔍 请求支持新网站
        
        没关系，告诉我们您发现的网站，我们会帮您分析！请填写以下信息：

  - type: input
    id: new-website-name
    attributes:
      label: 网站名称
      description: 您发现可以优化的网站叫什么？
      placeholder: 例如：小红书
    validations:
      required: false

  - type: input
    id: new-website-domain
    attributes:
      label: 网站域名
      description: 网站的网址是什么？
      placeholder: 例如：xiaohongshu.com
    validations:
      required: false

  - type: textarea
    id: new-website-example
    attributes:
      label: 示例链接
      description: 提供一个您觉得很长的链接示例
      placeholder: |
        https://www.xiaohongshu.com/explore/123456?share_source=copy_link
    validations:
      required: false

  - type: textarea
    id: new-website-usage
    attributes:
      label: 使用场景
      description: 您通常在什么情况下需要分享这个网站的链接？
      placeholder: |
        例如：
        - 经常在小红书看到好的笔记想分享给朋友
        - 复制出来的链接很长，带着很多参数
        - 希望链接能简洁一些
    validations:
      required: false

  - type: checkboxes
    id: new-website-check
    attributes:
      label: 确认事项
      options:
        - label: 这个网站的链接确实比较长，有优化的空间
          required: false
        - label: 我愿意提供更多信息帮助完善规则
          required: false

  - type: markdown
    attributes:
      value: |
        ---
        提交后我们会尽快评估，如果需要更多信息会在此 Issue 中与您沟通。感谢您的贡献！
