name: Sync to Gitee

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          # 配置 Git
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          # 添加 Gitee 远程仓库（使用 HTTPS + Token）
          git remote add gitee https://oauth2:${GITEE_TOKEN}@gitee.com/small-bedrock-i/url-simpweb.git
          
          # 获取所有分支
          git fetch --all
          
          # 推送到 Gitee
          git push gitee main:main --force
          
          echo "同步完成！"
